
    <style>
        * {
            box-sizing: border-box;
        }

        .builder-wrapper {
            display: grid;
            grid-template-columns: 100px 1fr 320px;
            gap: 0;
            min-height: calc(100vh - 120px);
            background: #f5f5f5;
            border-top: 1px solid #e0e0e0;
        }

        /* LEFT SIDEBAR - BLOCK SELECTOR */
        .builder-sidebar-left {
            background: #fff;
            border-right: 1px solid #e0e0e0;
            padding: 20px 0;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0;
        }

        .block-item {
            width: 80px;
            height: 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            cursor: move;
            user-select: none;
            transition: all 0.3s;
            border: 2px solid transparent;
            border-radius: 8px;
            font-size: 10px;
            color: #666;
            font-weight: 500;
            text-align: center;
            padding: 8px;
            draggable: true;
        }

        .block-item:hover {
            background: #f5f5f5;
            border-color: #e74c3c;
            color: #e74c3c;
        }

        .block-item i {
            font-size: 28px;
            color: inherit;
        }

        /* CENTER CONTENT AREA */
        .builder-center {
            background: #fff;
            padding: 30px 40px;
            overflow-y: auto;
            position: relative;
        }

        .editor-header {
            margin-bottom: 30px;
            border-bottom: 1px solid #e0e0e0;
            padding-bottom: 20px;
        }

        .editor-header h2 {
            font-size: 28px;
            font-weight: 600;
            color: #333;
            margin: 0 0 15px 0;
        }

        .editor-subheader {
            font-size: 12px;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
        }

        .editor-title-input {
            display: inline-block;
            font-size: 24px;
            font-weight: 600;
            border: none;
            border-bottom: 2px solid #e0e0e0;
            padding: 8px 0;
            margin-bottom: 15px;
            transition: border-color 0.2s;
            width: 100%;
        }

        .editor-title-input:focus {
            outline: none;
            border-color: #e74c3c;
        }

        .content-editor {
            min-height: 400px;
            border: 2px dashed #e0e0e0;
            border-radius: 8px;
            padding: 40px 20px;
            background: #fafafa;
            text-align: center;
            transition: all 0.3s;
        }

        .content-editor.drag-over {
            border-color: #e74c3c;
            background: #fff5f0;
        }

        .content-editor-placeholder {
            color: #999;
            font-size: 14px;
            font-weight: 500;
        }

        .content-blocks {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .content-block {
            background: #fafafa;
            border: 1px solid #e0e0e0;
            border-left: 4px solid #e74c3c;
            border-radius: 6px;
            padding: 15px;
            position: relative;
            transition: all 0.2s;
        }

        .content-block:hover {
            border-color: #e74c3c;
            box-shadow: 0 2px 8px rgba(231, 76, 60, 0.1);
        }

        .block-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .block-type {
            display: inline-block;
            background: #e74c3c;
            color: #fff;
            padding: 4px 10px;
            border-radius: 3px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .block-actions {
            display: flex;
            gap: 8px;
        }

        .block-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: #ccc;
            font-size: 16px;
            transition: color 0.2s;
            padding: 4px;
        }

        .block-btn:hover {
            color: #e74c3c;
        }

        .block-content input,
        .block-content textarea {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            font-family: inherit;
            font-size: 13px;
            margin-bottom: 8px;
        }

        .block-content textarea {
            resize: vertical;
            min-height: 60px;
        }

        /* RIGHT SIDEBAR - SETTINGS */
        .builder-sidebar-right {
            background: #f9f9f9;
            border-left: 1px solid #e0e0e0;
            padding: 20px;
            overflow-y: auto;
        }

        .settings-section {
            margin-bottom: 25px;
        }

        .settings-title {
            font-size: 12px;
            font-weight: 700;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
            display: block;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #333;
            margin-bottom: 6px;
        }

        .form-control {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            font-size: 13px;
            background: #fff;
            transition: border-color 0.2s;
        }

        .form-control:focus {
            outline: none;
            border-color: #e74c3c;
        }

        .form-check {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
        }

        .form-check input {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #e74c3c;
        }

        .form-check label {
            font-size: 13px;
            color: #333;
            cursor: pointer;
            margin: 0;
        }

        .badge {
            display: inline-block;
            background: #e74c3c;
            color: #fff;
            padding: 4px 10px;
            border-radius: 3px;
            font-size: 12px;
            margin-right: 6px;
            margin-bottom: 6px;
        }

        .badge .btn-close {
            margin-left: 6px;
            cursor: pointer;
        }

        .save-btn-group {
            display: flex;
            gap: 10px;
            padding: 20px 0;
            border-top: 1px solid #e0e0e0;
            margin-top: 20px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            flex: 1;
        }

        .btn-primary {
            background: #e74c3c;
            color: #fff;
        }

        .btn-primary:hover {
            background: #c0392b;
        }

        .btn-secondary {
            background: #e0e0e0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #ccc;
        }

        @media (max-width: 1400px) {
            .builder-wrapper {
                grid-template-columns: 80px 1fr 280px;
            }
        }

        @media (max-width: 992px) {
            .builder-wrapper {
                grid-template-columns: 1fr;
            }

            .builder-sidebar-left,
            .builder-sidebar-right {
                display: none;
            }
        }
    </style>

    <script>
        // Page Builder Logic
        let pageBlocks = [];
        let draggedBlockType = null;

        const builderCanvas = document.getElementById('builderCanvas');
        const contentStructure = document.getElementById('contentStructure');

        // Block Templates
        const blockTemplates = {
            heading: {
                type: 'heading',
                content: 'Enter heading text',
                level: 'h2'
            },
            paragraph: {
                type: 'paragraph',
                content: 'Enter paragraph text'
            },
            image: {
                type: 'image',
                src: '',
                alt: '',
                width: '100%'
            },
            button: {
                type: 'button',
                text: 'Click Me',
                url: '#',
                color: 'primary'
            },
            columns: {
                type: 'columns',
                cols: 2,
                content: ['Column 1', 'Column 2']
            },
            separator: {
                type: 'separator'
            },
            quote: {
                type: 'quote',
                text: 'Enter quote text',
                author: ''
            },
            list: {
                type: 'list',
                items: ['Item 1', 'Item 2', 'Item 3']
            },
            spacer: {
                type: 'spacer',
                height: '20px'
            }
        };

        // Drag and Drop - Dragging from Sidebar
        document.querySelectorAll('.block-item').forEach(item => {
            item.addEventListener('dragstart', (e) => {
                draggedBlockType = e.currentTarget.dataset.blockType;
                e.dataTransfer.effectAllowed = 'copy';
                e.dataTransfer.setData('text/plain', draggedBlockType);
            });
        });

        // Canvas Drop Zone
        builderCanvas.addEventListener('dragover', (e) => {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'copy';
            builderCanvas.classList.add('drag-over');
        });

        builderCanvas.addEventListener('dragleave', () => {
            builderCanvas.classList.remove('drag-over');
        });

        builderCanvas.addEventListener('drop', (e) => {
            e.preventDefault();
            builderCanvas.classList.remove('drag-over');

            if (draggedBlockType) {
                const blockData = JSON.parse(JSON.stringify(blockTemplates[draggedBlockType]));
                blockData.id = 'block-' + Date.now() + Math.random();
                pageBlocks.push(blockData);
                renderCanvas();
                draggedBlockType = null;
            }
        });

        // Render Canvas
        function renderCanvas() {
            if (pageBlocks.length === 0) {
                builderCanvas.innerHTML =
                    '<div class="content-editor-placeholder">Drag blocks from the sidebar to start building</div>';
            } else {
                builderCanvas.innerHTML = '';
                const blockContainer = document.createElement('div');
                blockContainer.className = 'content-blocks';
                pageBlocks.forEach((block, idx) => {
                    blockContainer.appendChild(createBlockElement(block, idx));
                });
                builderCanvas.appendChild(blockContainer);
            }
            updateContentStructure();
        }

        // Create Block Element
        function createBlockElement(block, idx) {
            const blockEl = document.createElement('div');
            blockEl.className = 'content-block';
            blockEl.dataset.blockId = block.id;

            let contentHTML = '';

            switch (block.type) {
                case 'heading':
                    contentHTML = `
                <div class="block-header">
                    <span class="block-type">Heading</span>
                    <div class="block-actions">
                        <button type="button" class="block-btn" onclick="deleteBlock('${block.id}')" title="Delete">✕</button>
                    </div>
                </div>
                <div class="block-content">
                    <input type="text" value="${block.content}" placeholder="Heading text" onchange="updateBlockContent('${block.id}', 'content', this.value)">
                </div>
            `;
                    break;

                case 'paragraph':
                    contentHTML = `
                <div class="block-header">
                    <span class="block-type">Text</span>
                    <div class="block-actions">
                        <button type="button" class="block-btn" onclick="deleteBlock('${block.id}')" title="Delete">✕</button>
                    </div>
                </div>
                <div class="block-content">
                    <textarea placeholder="Paragraph text" onchange="updateBlockContent('${block.id}', 'content', this.value)">${block.content}</textarea>
                </div>
            `;
                    break;

                case 'image':
                    contentHTML = `
                <div class="block-header">
                    <span class="block-type">Image</span>
                    <div class="block-actions">
                        <button type="button" class="block-btn" onclick="deleteBlock('${block.id}')" title="Delete">✕</button>
                    </div>
                </div>
                <div class="block-content">
                    <input type="text" value="${block.src}" placeholder="Image URL" onchange="updateBlockContent('${block.id}', 'src', this.value)" style="margin-bottom: 8px;">
                    <input type="text" value="${block.alt}" placeholder="Alt text" onchange="updateBlockContent('${block.id}', 'alt', this.value)">
                </div>
            `;
                    break;

                case 'button':
                    contentHTML = `
                <div class="block-header">
                    <span class="block-type">Button</span>
                    <div class="block-actions">
                        <button type="button" class="block-btn" onclick="deleteBlock('${block.id}')" title="Delete">✕</button>
                    </div>
                </div>
                <div class="block-content">
                    <input type="text" value="${block.text}" placeholder="Button text" onchange="updateBlockContent('${block.id}', 'text', this.value)" style="margin-bottom: 8px;">
                    <input type="text" value="${block.url}" placeholder="Button URL" onchange="updateBlockContent('${block.id}', 'url', this.value)">
                </div>
            `;
                    break;

                case 'separator':
                    contentHTML = `
                <div class="block-header">
                    <span class="block-type">Divider</span>
                    <div class="block-actions">
                        <button type="button" class="block-btn" onclick="deleteBlock('${block.id}')" title="Delete">✕</button>
                    </div>
                </div>
                <div style="height: 1px; background: #ddd; margin: 10px 0;"></div>
            `;
                    break;

                default:
                    contentHTML = `
                <div class="block-header">
                    <span class="block-type">${block.type.charAt(0).toUpperCase() + block.type.slice(1)}</span>
                    <div class="block-actions">
                        <button type="button" class="block-btn" onclick="deleteBlock('${block.id}')" title="Delete">✕</button>
                    </div>
                </div>
                <div class="block-content">[${block.type} block]</div>
            `;
            }

            blockEl.innerHTML = contentHTML;
            return blockEl;
        }

        // Update Block
        function updateBlockContent(blockId, field, value) {
            const block = pageBlocks.find(b => b.id === blockId);
            if (block) {
                block[field] = value;
                updateContentStructure();
            }
        }

        // Delete Block
        function deleteBlock(blockId) {
            pageBlocks = pageBlocks.filter(b => b.id !== blockId);
            renderCanvas();
        }

        // Update Content Structure
        function updateContentStructure() {
            contentStructure.value = JSON.stringify(pageBlocks);
        }

        // Tags Management
        let tags = [];
        const tagInput = document.getElementById('tags');
        const tagsContainer = document.getElementById('tags-container');
        const tagsHidden = document.getElementById('tags-hidden');

        function renderTags() {
            tagsContainer.innerHTML = '';
            tags.forEach((tag, index) => {
                const badge = document.createElement('span');
                badge.className = 'badge';
                badge.innerHTML =
                    `${tag} <span class="btn-close" onclick="removeTag(${index})" style="margin-left: 6px; cursor: pointer;">✕</span>`;
                tagsContainer.appendChild(badge);
            });
            tagsHidden.value = JSON.stringify(tags);
        }

        function removeTag(index) {
            tags.splice(index, 1);
            renderTags();
        }

        tagInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ',') {
                e.preventDefault();
                const tag = tagInput.value.trim();
                if (tag && !tags.includes(tag)) {
                    tags.push(tag);
                    tagInput.value = '';
                    renderTags();
                }
            }
        });

        tagInput.addEventListener('blur', () => {
            const tag = tagInput.value.trim();
            if (tag && !tags.includes(tag)) {
                tags.push(tag);
                tagInput.value = '';
                renderTags();
            }
        });

        // Auto-generate slug from title
        document.getElementById('title').addEventListener('input', function() {
            const slug = this.value
                .toLowerCase()
                .trim()
                .replace(/[^\w\s-]/g, '')
                .replace(/[\s_]+/g, '-')
                .replace(/^-+|-+$/g, '');
            document.getElementById('slug').value = slug;
        });

        // Validate on submit
        document.getElementById('pageForm').addEventListener('submit', function(e) {
            if (pageBlocks.length === 0) {
                e.preventDefault();
                alert('Please add at least one block to your page');
            }
        });
    </script>
